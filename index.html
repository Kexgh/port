<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="refresh" content="5; url=https://kexgh.com/">
    <title>Portfolio Moved | kexgh.xyz</title>
    <meta name="description" content="Dylan Keogh's cybersecurity portfolio has moved from kexgh.xyz to kexgh.com.">
    <meta name="robots" content="noindex, follow">
    <style>
      :root {
        color-scheme: dark;
        --bg: #080909;
        --panel: #111312;
        --text: #ece8dd;
        --muted: #a9a49a;
        --line: rgba(236, 232, 221, 0.16);
        --accent: #c7bda9;
        --ok: #7ad99d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at 50% 20%, rgba(199, 189, 169, 0.08), transparent 28rem),
          linear-gradient(180deg, #10100f 0%, var(--bg) 52%);
        color: var(--text);
        display: grid;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        line-height: 1.6;
        margin: 0;
        min-height: 100dvh;
        padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
      }

      main {
        margin: 0 auto;
        max-width: 760px;
        width: min(100%, 760px);
      }

      .terminal {
        background: rgba(17, 19, 18, 0.92);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        overflow: hidden;
      }

      .terminal-bar {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 0.55rem;
        min-width: 0;
        padding: 0.8rem 1rem;
      }

      .dot {
        border-radius: 50%;
        flex: 0 0 auto;
        height: 0.72rem;
        width: 0.72rem;
      }

      .red { background: #d96c6c; }
      .yellow { background: #d6b86a; }
      .green { background: #7ad99d; }

      .title {
        color: var(--muted);
        font-size: 0.85rem;
        margin-left: auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .terminal-body {
        padding: clamp(1.2rem, 5vw, 2.4rem);
      }

      .prompt {
        color: var(--ok);
        margin: 0 0 0.8rem;
        overflow-wrap: anywhere;
      }

      h1 {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(2.05rem, 12vw, 4.7rem);
        letter-spacing: 0;
        line-height: 0.98;
        margin: 0 0 1rem;
        overflow-wrap: anywhere;
      }

      p {
        color: var(--muted);
        margin: 0 0 1rem;
      }

      strong {
        color: var(--text);
      }

      .command {
        background: rgba(255, 255, 255, 0.035);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        margin: 1.4rem 0;
        overflow-wrap: anywhere;
        padding: 0.9rem 1rem;
        word-break: break-word;
      }

      a {
        color: var(--text);
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 4px;
      }

      .button {
        align-items: center;
        background: var(--accent);
        border-radius: 6px;
        color: #101010;
        display: inline-flex;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-weight: 800;
        justify-content: center;
        min-height: 2.8rem;
        padding: 0.7rem 1rem;
        text-align: center;
      }

      .small {
        font-size: 0.9rem;
        margin-top: 1rem;
      }

      @media (max-width: 520px) {
        body {
          align-items: start;
          padding: 0.75rem;
        }

        main {
          padding-top: 8vh;
        }

        .terminal {
          border-radius: 7px;
        }

        .terminal-bar {
          gap: 0.45rem;
          padding: 0.7rem 0.8rem;
        }

        .dot {
          height: 0.62rem;
          width: 0.62rem;
        }

        .title {
          font-size: 0.74rem;
          max-width: 58vw;
        }

        .terminal-body {
          padding: 1.1rem;
        }

        .prompt {
          font-size: 0.82rem;
        }

        p,
        .command {
          font-size: 0.92rem;
        }

        .command {
          margin: 1.1rem 0;
          padding: 0.78rem;
        }

        .button {
          display: flex;
          width: 100%;
        }
      }

      @media (max-width: 340px) {
        h1 {
          font-size: 1.8rem;
        }

        .terminal-body {
          padding: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="terminal" aria-labelledby="moved-title">
        <div class="terminal-bar" aria-hidden="true">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <span class="title">kexgh.xyz:/portfolio</span>
        </div>
        <div class="terminal-body">
          <p class="prompt">$ curl portfolio_status</p>
          <h1 id="moved-title">Portfolio moved.</h1>
          <p>Dylan Keogh's cybersecurity portfolio now lives at <strong>kexgh.com</strong>.</p>
          <div class="command" aria-label="Redirect command">redirect --from kexgh.xyz --to https://kexgh.com</div>
          <a class="button" href="https://kexgh.com/" rel="noopener">Open kexgh.com</a>
          <p class="small" aria-live="polite">Redirecting automatically in <span id="countdown">5</span> seconds.</p>
        </div>
      </section>
    </main>
    <script>
      const countdown = document.querySelector("#countdown");
      let remaining = 5;

      const timer = window.setInterval(() => {
        remaining -= 1;
        countdown.textContent = remaining;

        if (remaining <= 0) {
          window.clearInterval(timer);
          window.location.href = "https://kexgh.com/";
        }
      }, 1000);
    </script>
  </body>
</html>
