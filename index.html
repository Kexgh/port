<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="8; url=https://kexgh.com/">
    <title>Portfolio Moved | kexgh.xyz</title>
    <meta name="description" content="Dylan Keogh's cybersecurity portfolio has moved from kexgh.xyz to kexgh.com.">
    <meta name="robots" content="noindex, follow">
    <style>
      :root {
        color-scheme: dark;
        --bg: #080909;
        --panel: #111312;
        --text: #ece8dd;
        --muted: #a9a49a;
        --line: rgba(236, 232, 221, 0.16);
        --accent: #c7bda9;
        --ok: #7ad99d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at 50% 20%, rgba(199, 189, 169, 0.08), transparent 28rem),
          linear-gradient(180deg, #10100f 0%, var(--bg) 52%);
        color: var(--text);
        display: grid;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        line-height: 1.6;
        margin: 0;
        min-height: 100vh;
        padding: 1.25rem;
      }

      main {
        margin: 0 auto;
        max-width: 760px;
        width: 100%;
      }

      .terminal {
        background: rgba(17, 19, 18, 0.92);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        overflow: hidden;
      }

      .terminal-bar {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 0.55rem;
        padding: 0.8rem 1rem;
      }

      .dot {
        border-radius: 50%;
        height: 0.72rem;
        width: 0.72rem;
      }

      .red { background: #d96c6c; }
      .yellow { background: #d6b86a; }
      .green { background: #7ad99d; }

      .title {
        color: var(--muted);
        font-size: 0.85rem;
        margin-left: auto;
      }

      .terminal-body {
        padding: clamp(1.25rem, 4vw, 2.4rem);
      }

      .prompt {
        color: var(--ok);
        margin: 0 0 0.8rem;
      }

      h1 {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(2rem, 7vw, 4.7rem);
        letter-spacing: 0;
        line-height: 1;
        margin: 0 0 1rem;
      }

      p {
        color: var(--muted);
        margin: 0 0 1rem;
      }

      .command {
        background: rgba(255, 255, 255, 0.035);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        margin: 1.4rem 0;
        overflow-x: auto;
        padding: 0.9rem 1rem;
        white-space: nowrap;
      }

      a {
        color: var(--text);
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 4px;
      }

      .button {
        align-items: center;
        background: var(--accent);
        border-radius: 6px;
        color: #101010;
        display: inline-flex;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-weight: 800;
        min-height: 2.8rem;
        padding: 0.7rem 1rem;
      }

      .small {
        font-size: 0.9rem;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="terminal" aria-labelledby="moved-title">
        <div class="terminal-bar" aria-hidden="true">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
          <span class="title">kexgh.xyz:/portfolio</span>
        </div>
        <div class="terminal-body">
          <p class="prompt">$ curl portfolio_status</p>
          <h1 id="moved-title">Portfolio moved.</h1>
          <p>Dylan Keogh's cybersecurity portfolio now lives at <strong>kexgh.com</strong>.</p>
          <div class="command" aria-label="Redirect command">redirect --from kexgh.xyz --to https://kexgh.com</div>
          <a class="button" href="https://kexgh.com/" rel="noopener">Open kexgh.com</a>
          <p class="small">Redirecting automatically in 8 seconds.</p>
        </div>
      </section>
    </main>
  </body>
</html>
